<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGEN Library - Settings</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .settings-container {
            background: var(--bg-secondary);
            border-radius: var(--radius-xl);
            padding: 2rem;
            border: 1px solid var(--border-color);
            margin-top: 2rem;
            max-width: 800px;
        }

        .settings-section {
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
        }

        .settings-section:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .settings-section h2 {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 1rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 0.875rem;
            transition: all var(--transition-fast);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-primary);
            padding: 1rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 24px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .toggle-slider {
            background-color: var(--accent-primary);
        }

        input:checked + .toggle-slider:before {
            transform: translateX(20px);
        }
    </style>
</head>

<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <i class="ph-fill ph-books"></i>
                <span>NextGEN</span>
            </div>
            <nav class="nav-links">
                <a href="index.html"><i class="ph ph-squares-four"></i> Dashboard</a>
                <a href="catalog.html"><i class="ph ph-book-open"></i> Catalog</a>
                <a href="my-books.html"><i class="ph ph-bookmark-simple"></i> My Books</a>
                <a href="members.html"><i class="ph ph-users"></i> Members</a>
                <a href="reports.html"><i class="ph ph-chart-bar"></i> Reports</a>
                <a href="settings.html" class="active"><i class="ph ph-gear"></i> Settings</a>
            </nav>
            <div class="sidebar-footer">
                <button class="theme-toggle" id="themeToggle">
                    <i class="ph ph-moon"></i>
                    <span>Dark Mode</span>
                </button>
            </div>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div class="search-bar">
                    <i class="ph ph-magnifying-glass"></i>
                    <input type="text" placeholder="Search settings...">
                </div>
                <div class="user-profile">
                    <button class="notification-btn"><i class="ph ph-bell"></i><span class="badge">3</span></button>
                    <div class="avatar"><img
                            src="https://ui-avatars.com/api/?name=Admin+User&background=6366f1&color=fff"
                            alt="User Avatar"></div>
                </div>
            </header>

            <div class="dashboard-area">
                <div class="page-header">
                    <h1>Settings</h1>
                    <p>Manage your account preferences and application settings.</p>
                </div>

                <div class="settings-container">
                    <div class="settings-section">
                        <h2>Notifications</h2>
                        <div class="toggle-container">
                            <div>
                                <h3 style="font-size: 0.875rem; font-weight: 500;">Email Notifications</h3>
                                <p style="font-size: 0.75rem; color: var(--text-secondary);">Receive emails about your account activity.</p>
                            </div>
                            <label class="toggle-switch">
                                <input type="checkbox" checked>
                                <span class="toggle-slider"></span>
                            </label>
                        </div>
                    </div>

                    <div class="settings-section">
                        <h2>Account Privacy</h2>
                        <div class="form-group">
                            <label for="privacyLevel">Profile Visibility</label>
                            <select id="privacyLevel" class="form-control">
                                <option value="public">Public</option>
                                <option value="private">Private</option>
                                <option value="friends">Friends Only</option>
                            </select>
                        </div>
                    </div>

                    <div class="settings-section">
                        <h2>Security</h2>
                        <div class="form-group">
                            <label for="currentPassword">Current Password</label>
                            <input type="password" id="currentPassword" class="form-control" placeholder="••••••••">
                        </div>
                        <div class="form-group">
                            <label for="newPassword">New Password</label>
                            <input type="password" id="newPassword" class="form-control" placeholder="••••••••">
                        </div>
                        <button class="btn-primary" style="margin-top: 1rem;">Change Password</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
