<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGEN Library - Reports Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Include Chart.js for visualizations -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .reports-container {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .kpi-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .kpi-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            box-shadow: var(--shadow-sm);
        }

        .kpi-title {
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .kpi-value {
            color: var(--text-primary);
            font-size: 2rem;
            font-weight: 700;
        }

        .chart-container {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            padding: 2rem;
            box-shadow: var(--shadow-sm);
            width: 100%;
            height: 350px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .card-header h2 {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .table-wrapper {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            padding: 2rem;
            box-shadow: var(--shadow-sm);
            overflow-x: auto;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        .data-table th, .data-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        .data-table th {
            font-weight: 600;
            color: var(--text-secondary);
            background: var(--bg-primary);
            cursor: pointer;
            transition: background 0.2s;
            position: relative;
        }

        .data-table th:hover {
            background: var(--border-color);
        }

        .spinner-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 300px;
            color: var(--accent-primary);
        }
        
        .spinner-container i {
            font-size: 3rem;
        }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            font-weight: 600;
        }

        .status-completed {
            background: var(--success-bg);
            color: var(--success);
        }

        .status-failed {
            background: var(--danger-bg);
            color: var(--danger);
        }
    </style>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="logo">
                <i class="ph-fill ph-books" style="color: var(--accent-primary);"></i>
                <span>NextGEN</span>
            </div>
            <nav class="nav-links">
                <a href="index.html" class="nav-item"><i class="ph ph-squares-four"></i> Dashboard</a>
                <a href="catalog.html" class="nav-item"><i class="ph ph-book-open"></i> Catalog</a>
                <a href="my-books.html" class="nav-item"><i class="ph ph-bookmark-simple"></i> My Books</a>
                <a href="members.html" class="nav-item"><i class="ph ph-users"></i> Members</a>
                <a href="reports.html" class="nav-item active"><i class="ph ph-chart-bar"></i> Reports</a>
                <a href="settings.html" class="nav-item"><i class="ph ph-gear"></i> Settings</a>
            </nav>
            <div class="sidebar-footer">
                <button class="theme-toggle" id="themeToggle">
                    <i class="ph ph-moon"></i>
                    <span>Theme</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Topbar -->
            <header class="topbar">
                <div class="search-bar">
                    <i class="ph ph-magnifying-glass"></i>
                    <input type="text" placeholder="Search reports...">
                </div>
                <div class="user-profile">
                    <div class="notification-badge">
                        <i class="ph ph-bell"></i>
                        <span class="badge">3</span>
                    </div>
                    <div class="avatar">
                        <img src="https://ui-avatars.com/api/?name=Admin+User&background=6366f1&color=fff" alt="User">
                    </div>
                </div>
            </header>

            <!-- Dashboard Content -->
            <div class="dashboard-area">
                <div class="page-header flex-header" style="display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <h1>Reporting Dashboard</h1>
                        <p style="color: var(--text-secondary);">Real-time performance analytics and system activity loops.</p>
                    </div>
                    <button class="btn-primary" id="downloadCsvBtn"><i class="ph ph-download-simple"></i> Download CSV</button>
                </div>

                <div id="reportsContentWrapper">
                    <div class="spinner-container" id="reportsLoadingSpinner">
                        <i class="ph ph-spinner-gap ph-spin"></i>
                        <p style="margin-top: 1rem; color: var(--text-secondary);">Assembling Live Report...</p>
                    </div>

                    <div class="reports-container" id="reportsDynamicContainer" style="display: none;">
                        <!-- KPI Cards -->
                        <div class="kpi-cards">
                            <div class="kpi-card">
                                <div class="kpi-title">Total Books</div>
                                <div class="kpi-value" id="kpiTotalBooks">-</div>
                            </div>
                            <div class="kpi-card">
                                <div class="kpi-title">Active Members</div>
                                <div class="kpi-value" id="kpiActiveMembers">-</div>
                            </div>
                            <div class="kpi-card">
                                <div class="kpi-title">New Signups (30d)</div>
                                <div class="kpi-value" id="kpiNewSignups">-</div>
                            </div>
                        </div>

                        <!-- Chart -->
                        <div class="chart-container">
                            <canvas id="userGrowthChart"></canvas>
                        </div>

                        <!-- Data Table -->
                        <div class="table-wrapper">
                            <div class="card-header">
                                <h2>Recent Analytics Details</h2>
                            </div>
                            <table class="data-table" id="analyticsTable">
                                <thead>
                                    <tr>
                                        <th data-sort="date">Date <i class="ph ph-caret-up down" style="float:right;"></i></th>
                                        <th data-sort="activity">Activity <i class="ph ph-caret-up down" style="float:right;"></i></th>
                                        <th data-sort="user">User <i class="ph ph-caret-up down" style="float:right;"></i></th>
                                        <th data-sort="status">Status <i class="ph ph-caret-up down" style="float:right;"></i></th>
                                    </tr>
                                </thead>
                                <tbody id="reportsTableBody">
                                    <!-- Populated by JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
