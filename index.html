<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGEN Catalog</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <i class="ph-fill ph-books"></i>
                <span>NextGEN</span>
            </div>
            <nav class="nav-links">
                <a href="index.html"><i class="ph ph-squares-four"></i> Dashboard</a>
                <a href="catalog.html" class="active"><i class="ph ph-book-open"></i> Catalog</a>
                <a href="my-books.html"><i class="ph ph-bookmark-simple"></i> My Books</a>
                <a href="members.html"><i class="ph ph-users"></i> Members</a>
                <a href="reports.html"><i class="ph ph-chart-bar"></i> Reports</a>
                <a href="settings.html"><i class="ph ph-gear"></i> Settings</a>
            </nav>
            <div class="sidebar-footer">
                <button class="theme-toggle" id="themeToggle">
                    <i class="ph ph-moon"></i>
                    <span>Dark Mode</span>
                </button>
            </div>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div class="search-bar">
                    <i class="ph ph-magnifying-glass"></i>
                    <input type="text" id="searchInput" placeholder="Search catalog...">
                </div>
                <div class="user-profile">
                    <button class="notification-btn"><i class="ph ph-bell"></i><span class="badge">3</span></button>
                    <div class="avatar"><img
                            src="https://ui-avatars.com/api/?name=Admin+User&background=6366f1&color=fff"
                            alt="User Avatar"></div>
                </div>
            </header>

            <div class="dashboard-area">
                <div class="page-header flex-header">
                    <div>
                        <h1>Book Catalog</h1>
                        <p>Browse our entire collection or search for specific titles.</p>
                    </div>
                    <button class="btn-primary"><i class="ph ph-plus"></i> Add Book</button>
                </div>

                <div class="filters-bar">
                    <div class="filter-group" id="categoryFilters">
                        <!-- Populated by JS -->
                    </div>
                    <div class="view-toggles">
                        <button class="view-btn active" id="btnGridView"><i class="ph ph-squares-four"></i></button>
                        <button class="view-btn" id="btnListView"><i class="ph ph-list"></i></button>
                    </div>
                </div>

                <div class="catalog-grid" id="catalogContainer">
                    <!-- Populated by JS -->
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Base -->
    <div class="modal-overlay" id="bookModal">
        <div class="modal-content">
            <button class="modal-close" id="closeModal"><i class="ph ph-x"></i></button>
            <div id="modalBody">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
