<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGEN Library - Members</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .members-container {
            background: var(--bg-secondary);
            border-radius: var(--radius-xl);
            padding: 2rem;
            border: 1px solid var(--border-color);
            margin-top: 2rem;
        }

        .member-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .member-card {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all var(--transition-fast);
        }

        .member-card:hover {
            box-shadow: var(--shadow-sm);
            border-color: var(--accent-light);
            transform: translateX(4px);
        }

        .member-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .member-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--border-color);
        }

        .member-details h3 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }

        .member-details p {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

    </style>
</head>

<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <i class="ph-fill ph-books"></i>
                <span>NextGEN</span>
            </div>
            <nav class="nav-links">
                <a href="index.html"><i class="ph ph-squares-four"></i> Dashboard</a>
                <a href="catalog.html"><i class="ph ph-book-open"></i> Catalog</a>
                <a href="my-books.html"><i class="ph ph-bookmark-simple"></i> My Books</a>
                <a href="members.html" class="active"><i class="ph ph-users"></i> Members</a>
                <a href="reports.html"><i class="ph ph-chart-bar"></i> Reports</a>
                <a href="settings.html"><i class="ph ph-gear"></i> Settings</a>
            </nav>
            <div class="sidebar-footer">
                <button class="theme-toggle" id="themeToggle">
                    <i class="ph ph-moon"></i>
                    <span>Dark Mode</span>
                </button>
            </div>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div class="search-bar">
                    <i class="ph ph-magnifying-glass"></i>
                    <input type="text" placeholder="Search members...">
                </div>
                <div class="user-profile">
                    <button class="notification-btn"><i class="ph ph-bell"></i><span class="badge">3</span></button>
                    <div class="avatar"><img
                            src="https://ui-avatars.com/api/?name=Admin+User&background=6366f1&color=fff"
                            alt="User Avatar"></div>
                </div>
            </header>

            <div class="dashboard-area">
                <div class="page-header flex-header">
                    <div>
                        <h1>Members</h1>
                        <p>Manage library members and their profiles.</p>
                    </div>
                    <button class="btn-primary"><i class="ph ph-user-plus"></i> Add Member</button>
                </div>

                <div class="members-container">
                    <div class="member-list">
                        <!-- Member 1 -->
                        <div class="member-card">
                            <div class="member-info">
                                <img src="https://ui-avatars.com/api/?name=Alice+Smith&background=10b981&color=fff" alt="Avatar" class="member-avatar">
                                <div class="member-details">
                                    <h3>Alice Smith</h3>
                                    <p>alice.smith@example.com</p>
                                </div>
                            </div>
                            <button class="btn-primary" style="background: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--border-color);">View Profile</button>
                        </div>
                        <!-- Member 2 -->
                        <div class="member-card">
                            <div class="member-info">
                                <img src="https://ui-avatars.com/api/?name=Bob+Johnson&background=f59e0b&color=fff" alt="Avatar" class="member-avatar">
                                <div class="member-details">
                                    <h3>Bob Johnson</h3>
                                    <p>bob.johnson@example.com</p>
                                </div>
                            </div>
                            <button class="btn-primary" style="background: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--border-color);">View Profile</button>
                        </div>
                        <!-- Member 3 -->
                        <div class="member-card">
                            <div class="member-info">
                                <img src="https://ui-avatars.com/api/?name=Charlie+Davis&background=ef4444&color=fff" alt="Avatar" class="member-avatar">
                                <div class="member-details">
                                    <h3>Charlie Davis</h3>
                                    <p>charlie.davis@example.com</p>
                                </div>
                            </div>
                            <button class="btn-primary" style="background: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--border-color);">View Profile</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
