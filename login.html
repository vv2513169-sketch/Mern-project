<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGEN Library - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background-color: var(--bg-primary);
        }

        .auth-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            padding: 3rem;
            width: 100%;
            max-width: 480px;
            box-shadow: var(--shadow-lg);
        }

        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent-primary);
            margin-bottom: 2rem;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .auth-header h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all var(--transition-fast);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px var(--accent-light);
        }

        .btn-full {
            width: 100%;
            padding: 0.875rem;
            display: flex;
            justify-content: center;
            font-size: 1rem;
            margin-top: 1rem;
        }

        .auth-switch {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .auth-switch a {
            color: var(--accent-primary);
            font-weight: 600;
        }

        .auth-switch a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: var(--danger-bg);
            color: var(--danger);
            padding: 0.75rem;
            border-radius: var(--radius-md);
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
            display: none;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <i class="ph-fill ph-books"></i>
                <span>NextGEN</span>
            </div>

            <div id="loginView">
                <div class="auth-header">
                    <h1>Welcome Back</h1>
                    <p>Enter your details to access your account.</p>
                </div>

                <div id="loginError" class="error-message"></div>

                <form id="loginForm">
                    <div class="form-group">
                        <label for="loginEmail">Email Address</label>
                        <input type="email" id="loginEmail" required placeholder="you@example.com">
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn-primary btn-full" id="loginBtn">Sign In</button>
                </form>

                <div class="auth-switch">
                    Don't have an account? <a href="#" id="showRegister">Sign Up</a>
                </div>
            </div>

            <div id="registerView" style="display: none;">
                <div class="auth-header">
                    <h1>Create an Account</h1>
                    <p>Join the library to borrow books.</p>
                </div>

                <div id="registerError" class="error-message"></div>

                <form id="registerForm">
                    <div class="form-group">
                        <label for="regName">Full Name</label>
                        <input type="text" id="regName" required placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label for="regEmail">Email Address</label>
                        <input type="email" id="regEmail" required placeholder="you@example.com">
                    </div>
                    <div class="form-group">
                        <label for="regPassword">Password</label>
                        <input type="password" id="regPassword" required placeholder="••••••••" minlength="6">
                    </div>
                    <button type="submit" class="btn-primary btn-full" id="registerBtn">Sign Up</button>
                </form>

                <div class="auth-switch">
                    Already have an account? <a href="#" id="showLogin">Sign In</a>
                </div>
            </div>

            <div style="text-align: center; margin-top: 1.5rem;">
                <button class="theme-toggle" id="themeToggle" style="justify-content: center;">
                    <i class="ph ph-moon"></i>
                    <span>Theme</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Theming Logic specifically for auth page -->
    <script>
        const initTheme = () => {
            const toggle = document.getElementById('themeToggle');
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);

            toggle.addEventListener('click', () => {
                const current = document.documentElement.getAttribute('data-theme');
                const next = current === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', next);
                localStorage.setItem('theme', next);
            });
        };
        initTheme();
    </script>
    <script src="js/auth.js"></script>
</body>

</html>
